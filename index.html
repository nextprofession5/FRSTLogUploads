<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRST Logs Upload</title>
    <style>
        body {
            background-color: #000;
            background-image: radial-gradient(circle at center, #1a0000 0%, #000 100%); 
            color: #d1d1d1;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        h1 { color: #ff1a1a; text-shadow: 0 0 10px #ff0000; text-transform: uppercase; margin-bottom: 5px; }
        .subtitle { color: #888; margin-bottom: 30px; font-size: 0.9rem; }
        .main-container { width: 100%; max-width: 900px; }
        
        /* Dual Box Layout */
        .zones-wrapper { display: flex; gap: 20px; width: 100%; margin-bottom: 20px; }
        .drop-zone {
            flex: 1; height: 200px; border: 2px dashed #440000; background: rgba(20, 0, 0, 0.4);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            border-radius: 12px; cursor: pointer; transition: all 0.3s ease; text-align: center; padding: 15px;
        }
        .drop-zone:hover { border-color: #ff1a1a; background: rgba(40, 0, 0, 0.5); }
        .drop-zone.loaded { border-color: #ff1a1a; background: rgba(80, 0, 0, 0.3); box-shadow: 0 0 15px rgba(255, 26, 26, 0.4); border-style: solid; }
        
        .btn-group { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        button {
            background: #000; color: #ff1a1a; border: 1px solid #ff1a1a;
            padding: 12px 35px; font-weight: bold; cursor: pointer; text-transform: uppercase;
            transition: 0.2s; border-radius: 4px;
        }
        button:hover:not(:disabled) { background: #ff1a1a; color: #000; box-shadow: 0 0 10px #ff1a1a; }
        button:disabled { border-color: #444; color: #444; cursor: not-allowed; }

        /* Result View */
        .file-header { display: flex; justify-content: space-between; align-items: center; margin: 30px 0 10px; border-bottom: 1px solid #330000; padding-bottom: 5px; }
        textarea {
            width: 100%; height: 350px; background: #080808; color: #ff4d4d;
            border: 1px solid #330000; padding: 15px; box-sizing: border-box; 
            font-family: 'Consolas', 'Monaco', monospace; resize: none; border-radius: 4px;
        }
        
        @media (max-width: 600px) { .zones-wrapper { flex-direction: column; } }
        #upload-view, #result-view { display: none; width: 100%; }
    </style>
</head>
<body>

    <div class="main-container">
        <h1>FRST Logs Upload</h1>
        <p class="subtitle">Upload FRST.txt and Addition.txt to generate a shareable link.</p>

        <div id="upload-view" style="display: block;">
            <div class="zones-wrapper">
                <div class="drop-zone" id="zone-frst" onclick="document.getElementById('input-frst').click()">
                    <strong style="font-size: 1.2rem;">FRST.txt</strong>
                    <p id="name-frst" style="margin-top: 10px; color: #888;">Tap to select or drop file</p>
                    <input type="file" id="input-frst" hidden accept=".txt">
                </div>
                <div class="drop-zone" id="zone-add" onclick="document.getElementById('input-add').click()">
                    <strong style="font-size: 1.2rem;">Addition.txt</strong>
                    <p id="name-add" style="margin-top: 10px; color: #888;">Tap to select or drop file</p>
                    <input type="file" id="input-add" hidden accept=".txt">
                </div>
            </div>
            <div class="btn-group">
                <button id="upBtn" onclick="doUpload()">Finalize & Generate Link</button>
            </div>
        </div>

        <div id="result-view">
            <div class="btn-group">
                <button onclick="window.location.href=window.location.href.split('?')[0]">New Upload</button>
                <button id="copyBtn" onclick="copyLink()">Copy Shareable Link</button>
            </div>
            <div id="log-containers"></div>
        </div>
    </div>

    <script>
        // TOOBFSCAON
        const p1 = "github_pat_11BRVGUEI0GsAXGMG43tYd_";
        const p2 = "sYRAzMakYhMc8oYbKSCOifekH29Kn4rqH9vUYBVJSdTDADNBECSsQEFrOfY";
        const KEY = p1 + p2;

        let logs = { "FRST.txt": null, "Addition.txt": null };

        function setup(zId, iId, key) {
            const zone = document.getElementById(zId), input = document.getElementById(iId);
            const nameLabel = document.getElementById('name-' + (key === 'FRST.txt' ? 'frst' : 'add'));
            
            const handleFile = (file) => {
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    logs[key] = e.target.result;
                    zone.classList.add('loaded');
                    nameLabel.innerText = "✔ " + file.name;
                    nameLabel.style.color = "#ff1a1a";
                };
                reader.readAsText(file);
            };

            zone.ondragover = (e) => { e.preventDefault(); zone.style.borderColor = "#ff1a1a"; };
            zone.ondragleave = () => { if(!logs[key]) zone.style.borderColor = "#440000"; };
            zone.ondrop = (e) => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); };
            input.onchange = (e) => { handleFile(e.target.files[0]); };
        }

        setup('zone-frst', 'input-frst', 'FRST.txt');
        setup('zone-add', 'input-add', 'Addition.txt');

        async function doUpload() {
            const filesToUpload = {};
            for (let k in logs) { if (logs[k]) filesToUpload[k] = { content: logs[k] }; }
            
            if (Object.keys(filesToUpload).length === 0) {
                return alert("Please select at least one log file.");
            }

            const btn = document.getElementById('upBtn');
            btn.innerText = "UPLOADING...";
            btn.disabled = true;

            try {
                const response = await fetch("https://api.github.com/gists", {
                    method: "POST",
                    headers: { "Authorization": `token ${KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ public: false, files: filesToUpload })
                });

                if (response.ok) {
                    const data = await response.json();
                    const cleanUrl = window.location.href.split('?')[0];
                    window.location.href = cleanUrl + `?id=${data.id}`;
                } else {
                    throw new Error("Upload failed");
                }
            } catch (err) {
                alert("Error: Token might be expired or GitHub is blocking the request.");
                btn.innerText = "Finalize & Generate Link";
                btn.disabled = false;
            }
        }

        // LOAD RESULTS
        const urlParams = new URLSearchParams(window.location.search);
        const gistId = urlParams.get('id');

        if (gistId) {
            document.getElementById('upload-view').style.display = 'none';
            document.getElementById('result-view').style.display = 'block';

            fetch(`https://api.github.com/gists/${gistId}`)
                .then(r => r.json())
                .then(data => {
                    const container = document.getElementById('log-containers');
                    Object.keys(data.files).forEach(filename => {
                        const wrapper = document.createElement('div');
                        wrapper.innerHTML = `
                            <div class="file-header">
                                <h3>${filename}</h3>
                                <button onclick="downloadFile('${filename}', \`${encodeURIComponent(data.files[filename].content)}\`)">Download .txt</button>
                            </div>
                            <textarea readonly>${data.files[filename].content}</textarea>
                        `;
                        container.appendChild(wrapper);
                    });
                });
        }

        function downloadFile(name, content) {
            const blob = new Blob([decodeURIComponent(content)], { type: 'text/plain' });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = name;
            a.click();
        }

        function copyLink() {
            navigator.clipboard.writeText(window.location.href);
            const cBtn = document.getElementById('copyBtn');
            cBtn.innerText = "COPIED!";
            setTimeout(() => cBtn.innerText = "Copy Shareable Link", 2000);
        }
    </script>
</body>
</html>
