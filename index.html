<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRST Logs Upload</title>
    <style>
        body {
            background-color: #000;
            background-image: radial-gradient(circle at center, #1a0000 0%, #000 100%); 
            color: #d1d1d1;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        h1 { color: #ff1a1a; text-shadow: 0 0 10px #ff0000; text-transform: uppercase; text-align: center; margin-bottom: 5px; }
        .subtitle { color: #888; margin-bottom: 30px; text-align: center; font-size: 0.9rem; }
        .main-container { width: 100%; max-width: 900px; }

        /* Dual Box Layout */
        .zones-wrapper { display: flex; gap: 20px; width: 100%; margin-bottom: 20px; }
        .drop-zone {
            flex: 1; height: 180px; border: 2px dashed #440000; background: rgba(20, 0, 0, 0.3);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            border-radius: 10px; cursor: pointer; transition: 0.3s; text-align: center; padding: 10px;
        }
        .drop-zone:hover { border-color: #ff1a1a; background: rgba(40, 0, 0, 0.4); }
        .drop-zone.loaded { border-color: #ff1a1a; background: rgba(80, 0, 0, 0.3); box-shadow: 0 0 15px #ff1a1a; border-style: solid; }
        
        .btn-group { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        button {
            background: #000; color: #ff1a1a; border: 1px solid #ff1a1a;
            padding: 10px 25px; font-weight: bold; cursor: pointer; text-transform: uppercase;
            border-radius: 4px; transition: 0.2s;
        }
        button:hover:not(:disabled) { background: #ff1a1a; color: #000; }
        button:disabled { border-color: #444; color: #444; }

        /* Result View Styles */
        .file-header { display: flex; justify-content: space-between; align-items: center; margin: 35px 0 10px 0; border-bottom: 1px solid #330000; padding-bottom: 5px; }
        .file-header h3 { margin: 0; color: #ff1a1a; font-size: 1.1rem; }
        textarea {
            width: 100%; height: 350px; background: #080808; color: #ff4d4d;
            border: 1px solid #330000; padding: 15px; box-sizing: border-box; font-family: 'Consolas', monospace; resize: none;
        }

        @media (max-width: 600px) { .zones-wrapper { flex-direction: column; } }
        
        #upload-view { display: block; width: 100%; }
        #result-view { display: none; width: 100%; }
    </style>
</head>
<body>

    <div class="main-container">
        <h1>FRST Logs Upload</h1>
        <p class="subtitle">Upload FRST.txt and Addition.txt to generate a shareable link.</p>

        <div id="upload-view">
            <div class="zones-wrapper">
                <div class="drop-zone" id="zone-frst" onclick="document.getElementById('input-frst').click()">
                    <strong>FRST.txt</strong>
                    <p id="name-frst" style="font-size: 0.8rem; color: #888;">Tap or drop file</p>
                    <input type="file" id="input-frst" hidden accept=".txt">
                </div>
                <div class="drop-zone" id="zone-add" onclick="document.getElementById('input-add').click()">
                    <strong>Addition.txt</strong>
                    <p id="name-add" style="font-size: 0.8rem; color: #888;">Tap or drop file</p>
                    <input type="file" id="input-add" hidden accept=".txt">
                </div>
            </div>
            <div class="btn-group">
                <button id="upBtn" onclick="doUpload()">Finalize & Generate Link</button>
            </div>
        </div>

        <div id="result-view">
            <div class="btn-group">
                <button onclick="clearAll()">New Upload</button>
                <button id="copyBtn" onclick="copyLink()">Copy Shareable Link</button>
            </div>
            <div id="log-containers"></div>
        </div>
    </div>

    <script>
        // b
        const p1 = "github_pat_11BRVGUEI0GsAXGMG43tYd_"; 
        const p2 = "sYRAzMakYhMc8oYbKSCOifekH29Kn4rqH9vUYBVJSdTDADNBECSsQEFrOfY";
        const KEY = p1 + p2;

        let logs = { "FRST.txt": null, "Addition.txt": null };

        // FILE HANDLING
        function setup(zId, iId, key) {
            const zone = document.getElementById(zId), input = document.getElementById(iId);
            const nameLabel = document.getElementById('name-' + (key === 'FRST.txt' ? 'frst' : 'add'));
            
            const load = (f) => {
                if (!f) return;
                const r = new FileReader();
                r.onload = (e) => {
                    logs[key] = e.target.result;
                    zone.classList.add('loaded');
                    nameLabel.innerText = "✔ " + f.name;
                    nameLabel.style.color = "#ff1a1a";
                };
                r.readAsText(f);
            };

            zone.ondragover = (e) => { e.preventDefault(); zone.style.borderColor = "#ff1a1a"; };
            zone.ondragleave = () => { if(!logs[key]) zone.style.borderColor = "#440000"; };
            zone.ondrop = (e) => { e.preventDefault(); load(e.dataTransfer.files[0]); };
            input.onchange = (e) => { load(e.target.files[0]); };
        }

        setup('zone-frst', 'input-frst', 'FRST.txt');
        setup('zone-add', 'input-add', 'Addition.txt');

        // UPLOAD PROCESS
        async function doUpload() {
            const f = {};
            for (let k in logs) { if (logs[k]) f[k] = { content: logs[k] }; }
            if (Object.keys(f).length === 0) return alert("Please select a file first.");

            const b = document.getElementById('upBtn');
            b.innerText = "UPLOADING...";
            b.disabled = true;

            try {
                const r = await fetch("https://api.github.com/gists", {
                    method: "POST",
                    headers: { "Authorization": `token ${KEY}` },
                    body: JSON.stringify({ public: false, files: f })
                });

                if (r.ok) {
                    const d = await r.json();
                    const cleanUrl = window.location.href.split('?')[0];
                    window.location.href = cleanUrl + "?id=" + d.id;
                } else {
                    throw new Error();
                }
            } catch (e) {
                alert("Upload failed. Check your connection or token.");
                b.innerText = "Finalize & Generate Link";
                b.disabled = false;
            }
        }

        // VIEW CONTROLLER & DOWNLOAD LOGIC
        const id = new URLSearchParams(window.location.search).get('id');
        if (id && id.length > 5) {
            document.getElementById('upload-view').style.display = 'none';
            document.getElementById('result-view').style.display = 'block';

            fetch(`https://api.github.com/gists/${id}`).then(r => r.json()).then(d => {
                const c = document.getElementById('log-containers');
                Object.keys(d.files).forEach(n => {
                    const v = document.createElement('div');
                    // Add Download Button to each header
                    v.innerHTML = `
                        <div class="file-header">
                            <h3>${n}</h3>
                            <button onclick="downloadLog('${n}', \`${encodeURIComponent(d.files[n].content)}\`)">Download</button>
                        </div>
                        <textarea readonly>${d.files[n].content}</textarea>
                    `;
                    c.appendChild(v);
                });
            }).catch(() => clearAll());
        }

        function downloadLog(filename, content) {
            const blob = new Blob([decodeURIComponent(content)], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }

        function clearAll() {
            window.location.href = window.location.href.split('?')[0];
        }

        function copyLink() {
            navigator.clipboard.writeText(window.location.href);
            document.getElementById('copyBtn').innerText = "COPIED!";
            setTimeout(() => { document.getElementById('copyBtn').innerText = "Copy Shareable Link"; }, 2000);
        }
    </script>
</body>
</html>
